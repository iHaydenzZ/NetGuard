<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Radar glow gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131b27"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </radialGradient>

    <!-- Sweep gradient (fade from cyan to transparent) -->
    <linearGradient id="sweepFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d8ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d8ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer ring glow -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Dot glow -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Scan line glow -->
    <filter id="scanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Sweep cone clip -->
    <clipPath id="sweepClip">
      <path d="M256,256 L256,32 A224,224 0 0,1 440,140 Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1c2636" stroke-width="2"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#00d8ff" stroke-width="4" opacity="0.9" filter="url(#ringGlow)"/>

  <!-- Second ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1c2636" stroke-width="1.5" opacity="0.6"/>

  <!-- Third ring -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="#1c2636" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="32" fill="none" stroke="#1c2636" stroke-width="1" opacity="0.4"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="40" x2="256" y2="472" stroke="#1c2636" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="256" x2="472" y2="256" stroke="#1c2636" stroke-width="1" opacity="0.3"/>

  <!-- Sweep cone (the bright scan area) -->
  <g clip-path="url(#sweepClip)">
    <circle cx="256" cy="256" r="220" fill="#00d8ff" opacity="0.08"/>
  </g>

  <!-- Scan line (the bright leading edge) -->
  <line x1="256" y1="256" x2="440" y2="140" stroke="#00d8ff" stroke-width="3" opacity="0.9" filter="url(#scanGlow)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="5" fill="#00d8ff" opacity="0.8"/>

  <!-- Signal dots - representing detected network processes -->
  <!-- Dot 1: download traffic (green, upper right area) -->
  <circle cx="340" cy="170" r="8" fill="#00e68a" opacity="0.9" filter="url(#dotGlow)"/>

  <!-- Dot 2: upload traffic (blue, right area) -->
  <circle cx="380" cy="230" r="6" fill="#3b9eff" opacity="0.85" filter="url(#dotGlow)"/>

  <!-- Dot 3: caution/limited process (orange, lower area) -->
  <circle cx="300" cy="340" r="7" fill="#ffb020" opacity="0.8" filter="url(#dotGlow)"/>

  <!-- Dot 4: small traffic (cyan, left area) -->
  <circle cx="160" cy="200" r="5" fill="#00d8ff" opacity="0.7" filter="url(#dotGlow)"/>

  <!-- Subtle outer glow ring -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#00d8ff" stroke-width="1" opacity="0.3"/>
</svg>
